<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathFinder Pro AI - Learning Resources</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #050510;
            color: #e0e8ff;
            min-height: 100vh;
        }

        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at bottom, #0a0e27 0%, #050510 100%);
        }
        .starfield::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #00d4ff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(112, 0, 255, 0.8), transparent);
            background-size: 200px 200px, 300px 300px;
            animation: starfieldMove 80s linear infinite;
            opacity: 0.6;
        }
        @keyframes starfieldMove {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            -webkit-text-fill-color: white;
        }

        .nav-center { display: flex; gap: 0.5rem; }
        .nav-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: #a0b0d0;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn:hover { color: #fff; background: rgba(0, 212, 255, 0.1); }
        .nav-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(112, 0, 255, 0.2));
            color: #fff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-subtitle { color: #6b7a9a; margin-bottom: 2rem; }

        .glass-panel {
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* Search & Filters */
        .search-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .search-input::placeholder { color: #6b7a9a; }

        .filter-select {
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: #00d4ff; }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #a0b0d0;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .category-tab:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .category-tab.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(112, 0, 255, 0.2));
            border-color: rgba(0, 212, 255, 0.3);
            color: #fff;
        }

        /* Resources Grid */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .resource-card {
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .resource-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1);
        }
        .resource-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--resource-color, #00d4ff), var(--resource-color-2, #7000ff));
        }

        .resource-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .resource-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            flex-shrink: 0;
        }
        .resource-meta { flex: 1; }
        .resource-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--resource-color, #00d4ff);
            margin-bottom: 0.25rem;
        }
        .resource-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .resource-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.85rem;
        }
        .star { color: #ffaa00; }
        .star.empty { color: #6b7a9a; }

        .resource-description {
            color: #a0b0d0;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .resource-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resource-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .resource-tag {
            padding: 0.35rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #6b7a9a;
        }

        .btn {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            color: #fff;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #a0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* Progress Section */
        .progress-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        @media (max-width: 900px) { .progress-section { grid-template-columns: 1fr; } }

        .progress-card {
            padding: 1.5rem;
            text-align: center;
        }
        .progress-ring {
            width: 120px; height: 120px;
            margin: 0 auto 1rem;
            position: relative;
        }
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 8;
        }
        .progress-ring-fill {
            fill: none;
            stroke: var(--progress-color, #00d4ff);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: calc(283 - (283 * var(--progress)) / 100);
            transition: stroke-dashoffset 1s ease;
        }
        .progress-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }
        .progress-title { font-weight: 600; margin-bottom: 0.25rem; }
        .progress-desc { font-size: 0.85rem; color: #6b7a9a; }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            background: rgba(10, 15, 30, 0.98);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.4s;
            min-width: 300px;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-color: #00ff88; }

        @media (max-width: 768px) {
            .nav-center { display: none; }
            .container { padding: 80px 1rem 1rem; }
            .resources-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body x-data="resourcesPage()" x-init="init()">
    <div class="starfield"></div>

    <header class="header">
        <div class="logo" @click="goTo('dashboard')">
            <div class="logo-icon">◆</div>
            <span>PathFinder Pro</span>
        </div>

        <nav class="nav-center">
            <button class="nav-btn" @click="goTo('dashboard')">Dashboard</button>
            <button class="nav-btn" @click="goTo('analytics')">Analytics</button>
            <button class="nav-btn" @click="goTo('risk')">Risk Assessment</button>
            <button class="nav-btn" @click="goTo('roadmap')">Roadmap</button>
            <button class="nav-btn active" @click="goTo('resources')">Resources</button>
        </nav>

        <div class="user-menu">
            <div class="user-info" @click="goTo('profile')">
                <div class="user-avatar" x-text="userInitials"></div>
                <span class="user-name" x-text="user?.fullName?.split(' ')[0] || 'User'"></span>
            </div>
            <button class="logout-btn" @click="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:0.5rem">
            <div>
                <h1 class="page-title">📚 Learning Resources</h1>
                <p class="page-subtitle">Curated study materials tailored for your <span x-text="user?.degreeType?.toUpperCase() || 'B.TECH'"></span> program</p>
            </div>
            <a href="PathFinderPro_Study_Resources.pdf" download="PathFinderPro_Study_Resources.pdf"
               style="display:inline-flex;align-items:center;gap:0.6rem;padding:0.75rem 1.5rem;background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(112,0,255,0.2));border:1px solid rgba(0,212,255,0.4);border-radius:12px;color:#00d4ff;text-decoration:none;font-size:0.9rem;font-weight:600;transition:all 0.3s;white-space:nowrap;margin-top:0.5rem"
               onmouseover="this.style.background='linear-gradient(135deg,rgba(0,212,255,0.3),rgba(112,0,255,0.3))'"
               onmouseout="this.style.background='linear-gradient(135deg,rgba(0,212,255,0.2),rgba(112,0,255,0.2))'">
                📄 Download PDF Guide
            </a>
        </div>

        <!-- Progress Section -->
        <div class="glass-panel progress-section">
            <div class="progress-card">
                <div class="progress-ring" style="--progress: 65; --progress-color: #00d4ff;">
                    <svg width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="45"></circle>
                        <circle class="progress-ring-fill" cx="60" cy="60" r="45"></circle>
                    </svg>
                    <div class="progress-text">65%</div>
                </div>
                <div class="progress-title">Core Subjects</div>
                <div class="progress-desc">8/12 resources completed</div>
            </div>

            <div class="progress-card">
                <div class="progress-ring" style="--progress: 40; --progress-color: #00ff88;">
                    <svg width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="45"></circle>
                        <circle class="progress-ring-fill" cx="60" cy="60" r="45"></circle>
                    </svg>
                    <div class="progress-text">40%</div>
                </div>
                <div class="progress-title">Practice Problems</div>
                <div class="progress-desc">12/30 problems solved</div>
            </div>

            <div class="progress-card">
                <div class="progress-ring" style="--progress: 80; --progress-color: #ffaa00;">
                    <svg width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="45"></circle>
                        <circle class="progress-ring-fill" cx="60" cy="60" r="45"></circle>
                    </svg>
                    <div class="progress-text">80%</div>
                </div>
                <div class="progress-title">Video Lectures</div>
                <div class="progress-desc">16/20 lectures watched</div>
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="search-section">
            <input type="text" class="search-input" placeholder="🔍 Search resources..." x-model="searchQuery" @input="filterResources()">
            <select class="filter-select" x-model="difficultyFilter" @change="filterResources()">
                <option value="all">All Levels</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
            <select class="filter-select" x-model="sortBy" @change="sortResources()">
                <option value="recommended">Recommended</option>
                <option value="rating">Highest Rated</option>
                <option value="newest">Newest</option>
            </select>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="category-tab" :class="{ active: activeCategory === 'all' }" @click="setCategory('all')">
                📋 All Resources
            </button>
            <button class="category-tab" :class="{ active: activeCategory === 'courses' }" @click="setCategory('courses')">
                🎓 Courses
            </button>
            <button class="category-tab" :class="{ active: activeCategory === 'videos' }" @click="setCategory('videos')">
                🎥 Videos
            </button>
            <button class="category-tab" :class="{ active: activeCategory === 'articles' }" @click="setCategory('articles')">
                📄 Articles
            </button>
            <button class="category-tab" :class="{ active: activeCategory === 'practice' }" @click="setCategory('practice')">
                💻 Practice
            </button>
            <button class="category-tab" :class="{ active: activeCategory === 'books' }" @click="setCategory('books')">
                📖 Books
            </button>
        </div>

        <!-- Resources Grid -->
        <div class="resources-grid">
            <template x-for="resource in filteredResources" :key="resource.id">
                <div class="glass-panel resource-card" :style="`--resource-color: ${resource.color}; --resource-color-2: ${resource.color2}`">
                    <div class="resource-header">
                        <div class="resource-icon" :style="`background: linear-gradient(135deg, ${resource.color}20, ${resource.color2}20)`" x-text="resource.icon"></div>
                        <div class="resource-meta">
                            <div class="resource-type" x-text="resource.type"></div>
                            <div class="resource-title" x-text="resource.title"></div>
                            <div class="resource-rating">
                                <template x-for="i in 5">
                                    <span class="star" :class="{ empty: i > resource.rating }">★</span>
                                </template>
                                <span x-text="resource.rating + '/5'"></span>
                            </div>
                        </div>
                    </div>

                    <p class="resource-description" x-text="resource.description"></p>

                    <div class="resource-footer">
                        <div class="resource-tags">
                            <span class="resource-tag" x-text="resource.difficulty"></span>
                            <span class="resource-tag" x-text="resource.duration"></span>
                        </div>
                        <button class="btn btn-primary" @click="openResource(resource)">
                            Start →
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast" :class="toast.type" x-show="toast.visible" x-transition>
                <span x-text="toast.icon"></span>
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>

                        icon: '📚',
                        type: 'Book',
                        title: 'Clean Code by Robert Martin',
                        description: 'Best practices for writing maintainable and readable code.',
                        rating: 5,
                        difficulty: 'Intermediate',
                        duration: '464 pages',
                        color: '#00d4ff',
                        color2: '#ff4444',
                        category: 'books',
                        url: '#'
                    },
                    {
                        id: 11,
                        icon: '🎓',
                        type: 'Course',
                        title: 'CS50 - Harvard Introduction to CS',
                        description: 'Comprehensive introduction to computer science and programming.',
                        rating: 5,
                        difficulty: 'Beginner',
                        duration: '24 hours',
                        color: '#ffaa00',
                        color2: '#00d4ff',
                        category: 'courses',
                        url: 'https://cs50.harvard.edu/x/'
                    },
                    {
                        id: 12,
                        icon: '💻',
                        type: 'Practice',
                        title: 'CodeSignal Arcade',
                        description: 'Fun programming challenges with gamified learning.',
                        rating: 4,
                        difficulty: 'Beginner',
                        duration: 'Unlimited',
                        color: '#00ff88',
                        color2: '#7000ff',
                        category: 'practice',
                        url: 'https://codesignal.com/arcade'
                    }
                ],

                filteredResources: [],
                toasts: [],

                init() {
                    const session = sessionStorage.getItem('pathfinder_session');
                    if (!session) {
                        window.location.href = 'pathfinder-pro-login.html';
                        return;
                    }

                    this.user = JSON.parse(session);
                    this.userInitials = this.user.fullName?.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'ST';

                    this.filterResources();
                },

                setCategory(category) {
                    this.activeCategory = category;
                    this.filterResources();
                },

                filterResources() {
                    let filtered = this.resources;

                    // Filter by category
                    if (this.activeCategory !== 'all') {
                        filtered = filtered.filter(r => r.category === this.activeCategory);
                    }

                    // Filter by search
                    if (this.searchQuery) {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(r =>
                            r.title.toLowerCase().includes(query) ||
                            r.description.toLowerCase().includes(query)
                        );
                    }

                    // Filter by difficulty
                    if (this.difficultyFilter !== 'all') {
                        filtered = filtered.filter(r => r.difficulty.toLowerCase() === this.difficultyFilter);
                    }

                    this.filteredResources = filtered;
                },

                sortResources() {
                    let sorted = [...this.filteredResources];

                    switch (this.sortBy) {
                        case 'rating':
                            sorted.sort((a, b) => b.rating - a.rating);
                            break;
                        case 'newest':
                            sorted.sort((a, b) => b.id - a.id);
                            break;
                        default:
                            // Recommended - shuffle slightly for variety
                            break;
                    }

                    this.filteredResources = sorted;
                },

                openResource(resource) {
                    this.showToast(`Opening: ${resource.title}`, 'success');
                    if (resource.url !== '#') {
                        setTimeout(() => {
                            window.open(resource.url, '_blank');
                        }, 500);
                    }
                },

                goTo(page) {
                    const pages = {
                        'dashboard': 'pathfinder-pro-dashboard.html',
                        'analytics': 'pathfinder-pro-analytics.html',
                        'risk': 'pathfinder-pro-risk.html',
                        'roadmap': 'pathfinder-pro-roadmap.html',
                        'resources': 'pathfinder-pro-resources.html',
                        'profile': 'pathfinder-pro-profile.html'
                    };
                    if (pages[page]) window.location.href = pages[page];
                },

                logout() {
                    sessionStorage.removeItem('pathfinder_session');
                    window.location.href = 'pathfinder-pro-login.html';
                },

                showToast(message, type = 'success') {
                    const icons = { success: '✓', error: '✕', warning: '⚠' };
                    const toast = { id: Date.now(), message, type, icon: icons[type], visible: true };
                    this.toasts.push(toast);
                    setTimeout(() => {
                        toast.visible = false;
                        setTimeout(() => this.toasts = this.toasts.filter(t => t.id !== toast.id), 400);
                    }, 3000);
                }
            };
        }
    </script>
</body>
</html>
