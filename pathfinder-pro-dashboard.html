<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathFinder Pro AI - Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
            --glass-bg: rgba(10, 15, 30, 0.75);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #050510;
            color: #e0e8ff;
            min-height: 100vh;
        }

        /* Animated Background */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at bottom, #0a0e27 0%, #050510 100%);
            overflow: hidden;
        }
        .starfield::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #00d4ff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(112, 0, 255, 0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(3px 3px at 150px 120px, rgba(0, 212, 255, 0.5), transparent);
            background-size: 200px 200px, 300px 300px, 150px 150px, 400px 400px;
            animation: starfieldMove 80s linear infinite;
            opacity: 0.6;
        }
        @keyframes starfieldMove {
            from { transform: translateY(0); }
            to { transform: translateY(-250px); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logo:hover { transform: scale(1.05); }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            -webkit-text-fill-color: white;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.7); }
        }

        .nav-center {
            display: flex;
            gap: 0.5rem;
        }
        .nav-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: #a0b0d0;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover { color: #fff; background: rgba(0, 212, 255, 0.1); }
        .nav-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(112, 0, 255, 0.2));
            color: #fff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .user-info:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .user-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem;
        }

        /* Welcome Section */
        .welcome-section {
            margin-bottom: 2rem;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(112, 0, 255, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .welcome-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 212, 255, 0.05), transparent);
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }
        .welcome-content { position: relative; z-index: 1; }
        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-subtitle {
            color: #a0b0d0;
            font-size: 1.1rem;
        }
        .welcome-date {
            position: absolute;
            top: 2rem;
            right: 2rem;
            text-align: right;
            color: #6b7a9a;
            font-size: 0.9rem;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        .glass-panel:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }

        .stat-card {
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
        }
        .stat-card.blue::before { background: linear-gradient(90deg, #00d4ff, #7000ff); }
        .stat-card.green::before { background: linear-gradient(90deg, #00ff88, #00d4ff); }
        .stat-card.orange::before { background: linear-gradient(90deg, #ffaa00, #ff6b00); }
        .stat-card.red::before { background: linear-gradient(90deg, #ff4444, #ff6b6b); }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-icon.blue { background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.3); }
        .stat-icon.green { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.3); }
        .stat-icon.orange { background: rgba(255, 170, 0, 0.15); border: 1px solid rgba(255, 170, 0, 0.3); }
        .stat-icon.red { background: rgba(255, 68, 68, 0.15); border: 1px solid rgba(255, 68, 68, 0.3); }

        .stat-trend {
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .trend-up {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }
        .trend-down {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .stat-label {
            color: #6b7a9a;
            font-size: 0.9rem;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 1000px) { .dashboard-grid { grid-template-columns: 1fr; } }

        /* Chart Container */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .chart-filters {
            display: flex;
            gap: 0.5rem;
        }
        .filter-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #a0b0d0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
            color: #fff;
        }
        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Risk Card */
        .risk-card {
            padding: 2rem;
            text-align: center;
        }
        .risk-indicator {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: conic-gradient(var(--risk-color) var(--risk-deg), rgba(255,255,255,0.1) var(--risk-deg));
            animation: risk-pulse 2s ease-in-out infinite;
        }
        @keyframes risk-pulse {
            0%, 100% { box-shadow: 0 0 30px var(--risk-glow); }
            50% { box-shadow: 0 0 60px var(--risk-glow); }
        }
        .risk-indicator::before {
            content: '';
            position: absolute;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: #050510;
        }
        .risk-content {
            position: relative;
            z-index: 1;
        }
        .risk-score {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .risk-label {
            font-size: 0.8rem;
            color: #6b7a9a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .risk-status {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .risk-description {
            color: #a0b0d0;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .risk-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        /* Buttons */
        .btn {
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #a0b0d0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Activity Feed */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .activity-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid var(--activity-color, #00d4ff);
            transition: all 0.3s;
        }
        .activity-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }
        .activity-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
            background: rgba(0, 212, 255, 0.15);
        }
        .activity-content { flex: 1; }
        .activity-content h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .activity-content p {
            font-size: 0.85rem;
            color: #a0b0d0;
        }
        .activity-time {
            font-size: 0.75rem;
            color: #5a6a8a;
            white-space: nowrap;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .action-btn {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e0e8ff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .action-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }
        .action-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .action-btn:nth-child(1) .action-icon { background: rgba(0, 212, 255, 0.15); }
        .action-btn:nth-child(2) .action-icon { background: rgba(0, 255, 136, 0.15); }
        .action-btn:nth-child(3) .action-icon { background: rgba(255, 170, 0, 0.15); }
        .action-btn:nth-child(4) .action-icon { background: rgba(112, 0, 255, 0.15); }
        .action-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .action-desc {
            font-size: 0.8rem;
            color: #6b7a9a;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            background: rgba(10, 15, 30, 0.98);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 300px;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-color: #00ff88; }
        .toast.error { border-color: #ff4444; }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-center { display: none; }
            .welcome-date { display: none; }
            .container { padding: 80px 1rem 1rem; }
        }

        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #050510;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: #00d4ff;
            font-size: 1.1rem;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body x-data="dashboardPage()" x-init="init()">
    <!-- Loading Screen -->
    <div class="loading-overlay" x-show="loading" x-transition.opacity.duration.500ms>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading your dashboard...</div>
    </div>

    <!-- Background Effects -->
    <div class="starfield"></div>
    <div class="particles">
        <template x-for="i in 20">
            <div class="particle" :style="`left: ${Math.random() * 100}%; animation-delay: ${Math.random() * 15}s; animation-duration: ${10 + Math.random() * 10}s`"></div>
        </template>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo" @click="goTo('dashboard')">
            <div class="logo-icon">◆</div>
            <span>PathFinder Pro</span>
        </div>

        <nav class="nav-center">
            <button class="nav-btn active" @click="goTo('dashboard')">Dashboard</button>
            <button class="nav-btn" @click="goTo('analytics')">Analytics</button>
            <button class="nav-btn" @click="goTo('risk')">Risk Assessment</button>
            <button class="nav-btn" @click="goTo('roadmap')">Roadmap</button>
            <button class="nav-btn" @click="goTo('resources')">Resources</button>
        </nav>

        <div class="user-menu">
            <div class="user-info" @click="goTo('profile')">
                <div class="user-avatar" x-text="userInitials"></div>
                <span class="user-name" x-text="user?.fullName?.split(' ')[0] || 'User'"></span>
            </div>
            <button class="logout-btn" @click="logout()">Logout</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container" x-show="!loading" x-transition.opacity.duration.500ms>
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-content">
                <h1 class="welcome-title">Welcome back, <span x-text="user?.fullName?.split(' ')[0] || 'Student'"></span>! 👋</h1>
                <p class="welcome-subtitle">Here's your academic performance overview and personalized insights for today.</p>
            </div>
            <div class="welcome-date">
                <div x-text="currentDate"></div>
                <div x-text="currentTime" style="font-size: 1.5rem; color: #00d4ff; margin-top: 0.25rem;"></div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="glass-panel stat-card blue">
                <div class="stat-header">
                    <div class="stat-icon blue">📊</div>
                    <span class="stat-trend trend-up">+5.2%</span>
                </div>
                <div class="stat-value" x-text="stats.attendance + '%'"></div>
                <div class="stat-label">Attendance Rate</div>
            </div>

            <div class="glass-panel stat-card green">
                <div class="stat-header">
                    <div class="stat-icon green">🎯</div>
                    <span class="stat-trend trend-up">+2.1%</span>
                </div>
                <div class="stat-value" x-text="stats.sgpa"></div>
                <div class="stat-label">Current SGPA</div>
            </div>

            <div class="glass-panel stat-card orange">
                <div class="stat-header">
                    <div class="stat-icon orange">📚</div>
                    <span class="stat-trend trend-down">-1.5%</span>
                </div>
                <div class="stat-value" x-text="studyHoursDisplay"></div>
                <div class="stat-label">Study Hours/Day</div>
            </div>

            <div class="glass-panel stat-card" :class="riskLevel.class">
                <div class="stat-header">
                    <div class="stat-icon" :class="riskLevel.class" x-text="riskLevel.icon"></div>
                    <span class="stat-trend" :class="riskTrend > 0 ? 'trend-down' : 'trend-up'" x-text="(riskTrend > 0 ? '+' : '') + riskTrend + '%'"></span>
                </div>
                <div class="stat-value" x-text="riskScore + '%'"></div>
                <div class="stat-label" x-text="riskLevel.label + ' Risk'"></div>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Left Column -->
            <div class="main-content">
                <!-- Performance Chart -->
                <div class="glass-panel">
                    <div class="chart-header">
                        <h3 class="chart-title">📈 Performance Trends</h3>
                        <div class="chart-filters">
                            <button class="filter-btn" :class="{ active: chartFilter === 'week' }" @click="setChartFilter('week')">Week</button>
                            <button class="filter-btn" :class="{ active: chartFilter === 'month' }" @click="setChartFilter('month')">Month</button>
                            <button class="filter-btn" :class="{ active: chartFilter === 'semester' }" @click="setChartFilter('semester')">Semester</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="glass-panel">
                    <div class="chart-header">
                        <h3 class="chart-title">⚡ Quick Actions</h3>
                    </div>
                    <div class="quick-actions">
                        <button class="action-btn" @click="goTo('risk')">
                            <div class="action-icon">🎯</div>
                            <div class="action-title">Risk Assessment</div>
                            <div class="action-desc">Check your academic risk level</div>
                        </button>
                        <button class="action-btn" @click="goTo('roadmap')">
                            <div class="action-icon">🗺️</div>
                            <div class="action-title">View Roadmap</div>
                            <div class="action-desc">Your personalized learning path</div>
                        </button>
                        <button class="action-btn" @click="goTo('resources')">
                            <div class="action-icon">📚</div>
                            <div class="action-title">Resources</div>
                            <div class="action-desc">Curated study materials</div>
                        </button>
                        <button class="action-btn" @click="simulateStudy()">
                            <div class="action-icon">⏱️</div>
                            <div class="action-title">Study Timer</div>
                            <div class="action-desc">Track your study sessions</div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="sidebar">
                <!-- Risk Card -->
                <div class="glass-panel risk-card" :style="`--risk-color: ${riskLevel.color}; --risk-deg: ${riskScore * 3.6}deg; --risk-glow: ${riskLevel.glow}`">
                    <div class="risk-indicator">
                        <div class="risk-content">
                            <div class="risk-score" x-text="riskScore + '%'" :style="`color: ${riskLevel.color}`"></div>
                            <div class="risk-label">Risk Score</div>
                        </div>
                    </div>
                    <div class="risk-status" :style="`color: ${riskLevel.color}`" x-text="riskLevel.label"></div>
                    <p class="risk-description" x-text="riskLevel.description"></p>
                    <div class="risk-actions">
                        <button class="btn btn-primary" @click="goTo('risk')">View Details</button>
                        <button class="btn btn-secondary" @click="goTo('roadmap')">Improve</button>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="glass-panel">
                    <div class="chart-header">
                        <h3 class="chart-title">🕐 Recent Activity</h3>
                    </div>
                    <div class="activity-list">
                        <template x-for="activity in activities" :key="activity.id">
                            <div class="activity-item" :style="`--activity-color: ${activity.color}`">
                                <div class="activity-icon" x-text="activity.icon" :style="`background: ${activity.bgColor}`"></div>
                                <div class="activity-content">
                                    <h4 x-text="activity.title"></h4>
                                    <p x-text="activity.description"></p>
                                </div>
                                <div class="activity-time" x-text="activity.time"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast" :class="toast.type" x-show="toast.visible" x-transition>
                <span x-text="toast.icon"></span>
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>

    <script>
        function dashboardPage() {
            return {
                loading: true,
                user: null,
                userInitials: '',
                currentDate: '',
                currentTime: '',
                chartFilter: 'week',
                riskScore: 35,
                riskTrend: -5,

                stats: {
                    attendance: 85,
                    sgpa: '8.5',
                    studyHours: 3.5
                },

                get studyHoursDisplay() {
                    return this.stats.studyHours + 'h';
                },

                get riskLevel() {
                    if (this.riskScore < 30) return {
                        label: 'Low',
                        class: 'green',
                        icon: '✓',
                        color: '#00ff88',
                        glow: 'rgba(0, 255, 136, 0.5)',
                        description: 'You\'re on track! Keep up the excellent work.'
                    };
                    if (this.riskScore < 60) return {
                        label: 'Medium',
                        class: 'orange',
                        icon: '⚠',
                        color: '#ffaa00',
                        glow: 'rgba(255, 170, 0, 0.5)',
                        description: 'Some attention needed. Check your roadmap.'
                    };
                    return {
                        label: 'High',
                        class: 'red',
                        icon: '⚡',
                        color: '#ff4444',
                        glow: 'rgba(255, 68, 68, 0.5)',
                        description: 'Immediate action required. See recommendations.'
                    };
                },

                activities: [
                    { id: 1, icon: '📊', title: 'Risk Assessment Updated', description: 'Your risk score decreased by 5%', time: '2h ago', color: '#00ff88', bgColor: 'rgba(0, 255, 136, 0.15)' },
                    { id: 2, icon: '📚', title: 'Completed Resource', description: 'Data Structures Guide - Module 3', time: '5h ago', color: '#00d4ff', bgColor: 'rgba(0, 212, 255, 0.15)' },
                    { id: 3, icon: '🎯', title: 'Goal Achieved', description: '7-day study streak completed!', time: '1d ago', color: '#7000ff', bgColor: 'rgba(112, 0, 255, 0.15)' },
                    { id: 4, icon: '⚠️', title: 'Low Attendance Alert', description: 'CS301 class attendance below 75%', time: '2d ago', color: '#ffaa00', bgColor: 'rgba(255, 170, 0, 0.15)' }
                ],

                toasts: [],
                performanceChart: null,

                init() {
                    this.updateDateTime();
                    setInterval(() => this.updateDateTime(), 1000);

                    const session = sessionStorage.getItem('pathfinder_session');
                    if (!session) {
                        window.location.href = 'pathfinder-pro-login.html';
                        return;
                    }

                    this.user = JSON.parse(session);
                    this.userInitials = this.user.fullName?.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'ST';

                    // Load saved stats
                    const savedStats = localStorage.getItem('pathfinder_stats_' + this.user.email);
                    if (savedStats) {
                        const parsed = JSON.parse(savedStats);
                        this.stats = { ...this.stats, ...parsed };
                    }

                    // Calculate risk score based on stats
                    this.calculateRisk();

                    setTimeout(() => {
                        this.loading = false;
                        this.$nextTick(() => this.initChart());
                    }, 1500);

                    this.showToast('Welcome back, ' + this.user.fullName + '!', 'success');
                },

                updateDateTime() {
                    const now = new Date();
                    this.currentDate = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    this.currentTime = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                },

                calculateRisk() {
                    // Simulate risk calculation based on stats
                    let risk = 0;
                    risk += (100 - this.stats.attendance) * 0.3;
                    risk += Math.max(0, (7 - parseFloat(this.stats.sgpa)) * 10);
                    risk += Math.max(0, (4 - this.stats.studyHours) * 5);
                    this.riskScore = Math.min(Math.round(risk), 100);
                },

                initChart() {
                    const ctx = document.getElementById('performanceChart');
                    if (!ctx) return;

                    const gradient1 = ctx.getContext('2d').createLinearGradient(0, 0, 0, 300);
                    gradient1.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
                    gradient1.addColorStop(1, 'rgba(0, 212, 255, 0)');

                    const gradient2 = ctx.getContext('2d').createLinearGradient(0, 0, 0, 300);
                    gradient2.addColorStop(0, 'rgba(0, 255, 136, 0.3)');
                    gradient2.addColorStop(1, 'rgba(0, 255, 136, 0)');

                    this.performanceChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Study Hours',
                                data: [2, 3.5, 4, 2.5, 5, 3, 4.5],
                                borderColor: '#00d4ff',
                                backgroundColor: gradient1,
                                fill: true,
                                tension: 0.4
                            }, {
                                label: 'Target',
                                data: [4, 4, 4, 4, 4, 4, 4],
                                borderColor: '#00ff88',
                                backgroundColor: gradient2,
                                fill: true,
                                borderDash: [5, 5],
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: { color: '#a0b0d0', font: { family: 'Inter' } }
                                }
                            },
                            scales: {
                                y: {
                                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                    ticks: { color: '#6b7a9a', font: { family: 'Inter' } }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#6b7a9a', font: { family: 'Inter' } }
                                }
                            }
                        }
                    });
                },

                setChartFilter(filter) {
                    this.chartFilter = filter;
                    // Update chart data based on filter
                    const data = {
                        week: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], data: [2, 3.5, 4, 2.5, 5, 3, 4.5] },
                        month: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], data: [18, 22, 25, 28] },
                        semester: { labels: ['Month 1', 'Month 2', 'Month 3', 'Month 4', 'Month 5', 'Month 6'], data: [75, 82, 78, 85, 88, 90] }
                    };

                    if (this.performanceChart) {
                        this.performanceChart.data.labels = data[filter].labels;
                        this.performanceChart.data.datasets[0].data = data[filter].data;
                        this.performanceChart.update();
                    }
                    this.showToast(`Showing data for ${filter}`, 'success');
                },

                simulateStudy() {
                    this.showToast('Study timer started! Focus for 25 minutes.', 'success');
                    setTimeout(() => {
                        this.showToast('Study session complete! +1 hour tracked.', 'success');
                        this.stats.studyHours += 1;
                        this.calculateRisk();
                    }, 3000);
                },

                goTo(page) {
                    const pages = {
                        'dashboard': 'pathfinder-pro-dashboard.html',
                        'analytics': 'pathfinder-pro-analytics.html',
                        'risk': 'pathfinder-pro-risk.html',
                        'roadmap': 'pathfinder-pro-roadmap.html',
                        'resources': 'pathfinder-pro-resources.html',
                        'profile': 'pathfinder-pro-profile.html'
                    };
                    if (pages[page]) window.location.href = pages[page];
                },

                logout() {
                    sessionStorage.removeItem('pathfinder_session');
                    window.location.href = 'pathfinder-pro-login.html';
                },

                showToast(message, type = 'success') {
                    const icons = { success: '✓', error: '✕', warning: '⚠' };
                    const toast = { id: Date.now(), message, type, icon: icons[type], visible: true };
                    this.toasts.push(toast);
                    setTimeout(() => {
                        toast.visible = false;
                        setTimeout(() => this.toasts = this.toasts.filter(t => t.id !== toast.id), 400);
                    }, 3000);
                }
            };
        }
    </script>
</body>
</html>
